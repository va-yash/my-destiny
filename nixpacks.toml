# Root-level Nixpacks config for Railway monorepo deployment.
# pyswisseph is a C extension — gcc, Python headers, setuptools and wheel
# are all required to compile it from source.
 
[phases.setup]
nixPkgs = [
  "gcc",
  "python311",
  "python311Packages.pip",
  "python311Packages.setuptools",
  "python311Packages.wheel"
]
 
[phases.install]
cmds = ["python3 -m pip install -r backend/requirements.txt"]
 
[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
