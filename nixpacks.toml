# Root-level Nixpacks config for Railway monorepo deployment.
# pyswisseph (.so) needs libstdc++.so.6 at runtime — that lives in
# stdenv.cc.cc.lib (separate from the gcc compiler package).
# LD_LIBRARY_PATH exposes the Nix profile libs to the dynamic linker.

[phases.setup]
nixPkgs = ["gcc", "stdenv.cc.cc.lib", "python311"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip setuptools wheel",
  "/app/.venv/bin/pip install -r backend/requirements.txt"
]

[variables]
LD_LIBRARY_PATH = "/root/.nix-profile/lib"

[start]
cmd = "cd backend && /app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
