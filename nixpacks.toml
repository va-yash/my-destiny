# Railway / Nixpacks build configuration
# pyswisseph is a C extension — it needs gcc and Python headers to compile.

[phases.setup]
nixPkgs = ["gcc", "python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
