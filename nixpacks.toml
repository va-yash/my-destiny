# Root-level Nixpacks config for Railway monorepo deployment.
# pyswisseph is a C extension — gcc and Python headers are required to compile it.
# pip is bootstrapped via ensurepip (Nix pip packages don't link as Python modules).
 
[phases.setup]
nixPkgs = ["gcc", "python311"]
 
[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade",
  "python3 -m pip install --upgrade pip setuptools wheel",
  "python3 -m pip install -r backend/requirements.txt"
]
 
[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
